# Nginx server configuration for sijakpreloader
# Place this file in /etc/nginx/sites-available/sijakpreloader
# Then: sudo ln -s /etc/nginx/sites-available/sijakpreloader /etc/nginx/sites-enabled/sijakpreloader
# And reload nginx: sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    
    server_name rdrpredictmarket.com www.rdrpredictmarket.com;
    
    # Point to the sijakpreloader html directory
    root /var/www/sijakpreloader/html;
    
    # Serve index.html as the root
    index index.html;
    
    # Deny access to hidden files and directories
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Deny access to git, node_modules, etc
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Deny access to sensitive files
    location ~ \.(conf|env|json)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Main location block - only serve from html directory
    location / {
        try_files $uri $uri/ =404;
    }
    
    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }
    
    # HTML files with no-cache
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
}
