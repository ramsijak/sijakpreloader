<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>V7 · Live Ticker Stack — sijakpreloader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:#0e0f12; color:#fff; font-family:"Inter", system-ui, sans-serif; }
  body { display:flex; align-items:stretch; justify-content:center; }
  #app { width:100%; max-width:480px; height:100vh; height:100dvh; display:flex; flex-direction:column; }
  @media (min-width: 900px) {
    body { background:#050606; align-items:center; padding:24px 0; }
    #app { width:100%; max-width:560px; height:min(800px, 100dvh); border-radius:14px; overflow:hidden; box-shadow:0 30px 80px rgba(0,0,0,0.5); }
  }
  
  .header { padding:18px 22px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #1f2024; }
  
  .logo { display:flex; align-items:center; gap:10px; }
  .logo-badge { width:22px; height:22px; background:#fff; color:#0e0f12; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; border-radius:5px; }
  .logo-text { font-weight:700; font-size:15px; letter-spacing:-0.01em; }
  
  .live { font-size:10px; color:#888; font-family:'"DM Mono"'; letter-spacing:0.1em; }
  .live-dot { color:#22c55e; }
  
  .intro { padding:22px 22px 6px; }
  .intro-h { font-size:30px; line-height:1.05; margin:0; font-weight:700; letter-spacing:-0.025em; }
  .intro-p { font-size:13px; color:#888; margin:10px 0 0; line-height:1.5; }
  
  .cards { flex:1; padding:14px 22px 10px; display:flex; flex-direction:column; gap:10px; overflow-y:auto; }
  
  .card { flex:1; min-height:0; background:#15171b; border:1px solid #1f2024; border-radius:10px; padding:14px 16px; display:grid; grid-template-columns:1fr auto; gap:14px; align-items:center; position:relative; overflow:hidden; cursor:pointer; transition:border-color 0.15s; }
  .card:hover { border-color:#22c55e; }
  
  .card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; }
  
  .card-left { min-width:0; }
  
  .card-tag { font-size:9px; color:var(--color); letter-spacing:0.18em; font-family:'"DM Mono"'; font-weight:600; margin-bottom:6px; }
  
  .card-q { font-size:15px; font-weight:600; line-height:1.25; letter-spacing:-0.01em; margin-bottom:8px; }
  
  .sparkline { width:120px; height:24px; display:block; }
  
  .card-right { text-align:right; }
  
  .card-pct { font-size:30px; font-weight:700; letter-spacing:-0.03em; line-height:1; font-feature-settings:'"tnum"'; }
  .card-pct-small { font-size:14px; color:#888; }
  
  .card-delta { font-size:11px; color:var(--delta-color); margin-top:4px; font-family:'"DM Mono"'; }
  
  .card-trade { margin-top:10px; padding:6px 12px; background:transparent; border:1px solid var(--color); color:var(--color); font-size:11px; font-weight:600; border-radius:5px; cursor:pointer; }
  .card-trade:hover { background:var(--color); color:#0e0f12; }
  
  .bottom { padding:14px 22px 18px; border-top:1px solid #1f2024; }
  .cta { width:100%; padding:14px 22px; background:#fff; color:#0e0f12; border:none; border-radius:8px; font-family:"Inter"; font-weight:600; font-size:14px; letter-spacing:-0.005em; cursor:pointer; }
  .cta:hover { background:#eee; }
  
  .cta-sub { font-size:10px; color:#666; text-align:center; margin-top:8px; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">
      <div class="logo-badge">V</div>
      <span class="logo-text">verdict</span>
    </div>
    <div class="live">
      <span class="live-dot">●</span> 4,217 LIVE · 480 OPEN
    </div>
  </div>

  <div class="intro">
    <h1 class="intro-h">Three questions.<br/>Three answers worth real money.</h1>
    <p class="intro-p">Pick one. Set your side. We'll tell you what the crowd thinks.</p>
  </div>

  <div class="cards" id="cardsContainer"></div>

  <div class="bottom">
    <button class="cta">See all 480 markets →</button>
    <p class="cta-sub">Free account · No deposit to browse</p>
  </div>
</div>

<script>
const cards = [
  { tag:'CLIMATE', q:'Hottest July ever recorded in the UK?', pct:71, delta:'+9', up:true, traders:2840, color:'#f97316' },
  { tag:'GEO', q:'Russia–Ukraine ceasefire by September?', pct:22, delta:'-3', up:false, traders:6841, color:'#3b82f6' },
  { tag:'SPORTS', q:'England wins the Ashes in 2026?', pct:38, delta:'+4', up:true, traders:4217, color:'#22c55e' },
];

function genSparkline(pct, up) {
  const seed = pct;
  const pts = Array.from({ length:14 }, (_, i) => seed + Math.sin(i*0.7 + seed*0.1)*4 + (i*0.3*(up?1:-1)));
  const max = Math.max(...pts), min = Math.min(...pts);
  const path = pts.map((p,i) => {
    const x = (i/(pts.length-1))*100;
    const y = 30 - ((p-min)/(max-min || 1))*30;
    return `${i===0?'M':'L'}${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg viewBox="0 0 100 30" preserveAspectRatio="none" class="sparkline">
    <path d="${path}" fill="none" stroke="${up?'#22c55e':'#ef4444'}" stroke-width="1.4" />
  </svg>`;
}

const container = document.getElementById('cardsContainer');
cards.forEach(c => {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.setProperty('--color', c.color);
  card.style.setProperty('--delta-color', c.up ? '#22c55e' : '#ef4444');
  card.style.backgroundColor = '#15171b';
  card.innerHTML = `
    <div class="card-left">
      <div class="card-tag">${c.tag}</div>
      <div class="card-tag" style="font-size:9px; color:#666; margin-bottom:0;">· ${c.traders.toLocaleString()} traders</div>
      <div class="card-q">${c.q}</div>
      ${genSparkline(c.pct, c.up)}
    </div>
    <div class="card-right">
      <div class="card-pct">${c.pct}<span class="card-pct-small">%</span></div>
      <div class="card-delta">${c.up?'▲':'▼'} ${c.delta}</div>
      <button class="card-trade">Trade →</button>
    </div>
  `;
  container.appendChild(card);
});
</script>
</body>
</html>
