<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>V3 · NHL Swipe Quiz — sijakpreloader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800;900&family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:linear-gradient(180deg, #1e1b4b 0%, #312e81 100%); color:#fff; font-family:"Archivo", system-ui, sans-serif; }
  body { display:flex; align-items:stretch; justify-content:center; }
  #app { width:100%; max-width:480px; height:100vh; height:100dvh; display:flex; flex-direction:column; }
  @media (min-width: 900px) {
    body { background:#0a0820; align-items:center; padding:24px 0; }
    #app { width:100%; max-width:1280px; height:min(800px, 100dvh); border-radius:14px; overflow:hidden; box-shadow:0 30px 80px rgba(0,0,0,0.5); }
  }
  
  .header { padding:14px 18px; display:flex; align-items:center; justify-content:space-between; }
  @media (min-width: 900px) { .header { padding:20px 40px; } }
  
  .logo { display:flex; align-items:center; gap:8px; }
  .logo-badge { width:20px; height:20px; background:#fbbf24; color:#1e1b4b; display:flex; align-items:center; justify-content:center; font-family:"Archivo Black"; font-size:13px; border-radius:5px; }
  @media (min-width: 900px) { .logo-badge { width:26px; height:26px; font-size:16px; } }
  
  .logo-text { font-family:"Archivo Black"; font-size:15px; letter-spacing:-0.02em; }
  @media (min-width: 900px) { .logo-text { font-size:18px; } }
  
  .progress-label { font-family:"JetBrains Mono"; font-size:11px; color:rgba(255,255,255,0.6); letter-spacing:0.12em; }
  
  .progress-bars { display:flex; gap:6px; padding:0 18px 8px; }
  @media (min-width: 900px) { .progress-bars { padding:0 40px 8px; } }
  
  .progress-bar { flex:1; height:3px; border-radius:99px; background:rgba(255,255,255,0.15); transition:background 0.3s; }
  .progress-bar.done { background:#fbbf24; }
  
  .main { flex:1; padding:20px 22px; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; }
  @media (min-width: 900px) { .main { padding:20px 40px; } }
  
  .card { width:100%; max-width:100%; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:20px; padding:32px 24px; backdrop-filter:blur(20px); animation:slideIn 0.35s cubic-bezier(.2,.8,.2,1); }
  @keyframes slideIn { from{opacity:0;transform:translateY(20px) scale(0.95)} to{opacity:1;transform:none} }
  @media (min-width: 900px) { .card { max-width:600px; padding:48px 40px; } }
  
  .card-emoji { font-size:60px; line-height:1; margin-bottom:16px; }
  @media (min-width: 900px) { .card-emoji { font-size:80px; margin-bottom:24px; } }
  
  .card-label { font-size:11px; color:#fbbf24; letter-spacing:0.18em; font-family:"JetBrains Mono"; margin-bottom:14px; }
  @media (min-width: 900px) { .card-label { margin-bottom:14px; } }
  
  .card-h { font-family:"Archivo Black"; font-size:32px; line-height:1.0; letter-spacing:-0.03em; margin:0 0 12px; }
  @media (min-width: 900px) { .card-h { font-size:52px; } }
  
  .card-p { font-size:13px; color:rgba(255,255,255,0.65); margin:0 0 28px; }
  @media (min-width: 900px) { .card-p { font-size:16px; } }
  
  .buttons { display:flex; gap:12px; }
  
  .swipe-btn { flex:1; padding:18px 14px; background:#fff; color:#1e1b4b; border:3px solid; border-radius:14px; cursor:pointer; font-family:"Archivo Black"; transition:transform 0.12s, box-shadow 0.12s; box-shadow:0 4px 0 currentColor; }
  @media (min-width: 900px) { .swipe-btn { padding:24px 18px; } }
  
  .swipe-btn:active { transform:translateY(2px); box-shadow:0 2px 0 currentColor; }
  
  .swipe-label { font-size:30px; letter-spacing:-0.04em; line-height:0.9; margin-bottom:6px; }
  @media (min-width: 900px) { .swipe-label { font-size:40px; margin-bottom:10px; } }
  
  .swipe-sub { font-size:11px; font-family:"Archivo"; font-weight:500; color:#666; }
  @media (min-width: 900px) { .swipe-sub { font-size:13px; } }
  
  .swipe-no { border-color:#ef4444; color:#ef4444; }
  .swipe-yes { border-color:#22c55e; color:#22c55e; }
  
  .footer-text { padding:0 22px 18px; text-align:center; font-size:11px; color:rgba(255,255,255,0.5); font-family:"JetBrains Mono"; letter-spacing:0.1em; }
  @media (min-width: 900px) { .footer-text { padding:0 40px 20px; } }
  
  .results { flex:1; padding:20px 22px; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; }
  @media (min-width: 900px) { .results { padding:20px 40px; } }
  
  .results-card { width:100%; max-width:100%; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:20px; padding:28px 22px; backdrop-filter:blur(20px); animation:slideIn 0.35s cubic-bezier(.2,.8,.2,1); }
  @media (min-width: 900px) { .results-card { max-width:600px; padding:40px 36px; } }
  
  .results-emoji { font-size:54px; margin-bottom:14px; }
  @media (min-width: 900px) { .results-emoji { font-size:72px; margin-bottom:14px; } }
  
  .results-h { font-family:"Archivo Black"; font-size:30px; letter-spacing:-0.03em; margin:0 0 8px; line-height:1; }
  @media (min-width: 900px) { .results-h { font-size:40px; } }
  
  .results-p { font-size:14px; color:rgba(255,255,255,0.7); margin:0 0 22px; line-height:1.5; }
  @media (min-width: 900px) { .results-p { font-size:16px; } }
  
  .results-picks { display:flex; flex-direction:column; gap:8px; margin-bottom:24px; }
  
  .results-pick { display:flex; align-items:center; gap:12px; padding:10px 14px; background:rgba(0,0,0,0.25); border-radius:10px; }
  @media (min-width: 900px) { .results-pick { padding:10px 14px; } }
  
  .results-emoji-sm { font-size:22px; }
  .results-q { font-size:12px; text-align:left; color:rgba(255,255,255,0.85); flex:1; }
  @media (min-width: 900px) { .results-q { font-size:14px; } }
  
  .results-ans { font-family:"Archivo Black"; font-size:13px; color:#22c55e; letter-spacing:-0.02em; }
  @media (min-width: 900px) { .results-ans { font-size:16px; } }
  
  .results-cta { width:100%; padding:14px 22px; background:#fbbf24; color:#1e1b4b; border:none; border-radius:10px; font-family:"Archivo Black"; font-size:15px; letter-spacing:-0.01em; cursor:pointer; animation:pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
  @media (min-width: 900px) { .results-cta { font-size:17px; } }
  
  .results-sub { font-size:11px; color:rgba(255,255,255,0.5); margin-top:12px; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">
      <div class="logo-badge">V</div>
      <span class="logo-text">VERDICT</span>
    </div>
    <div class="progress-label" id="progressLabel">1 OF 3</div>
  </div>

  <div class="progress-bars" id="progressBars">
    <div class="progress-bar"></div>
    <div class="progress-bar"></div>
    <div class="progress-bar"></div>
  </div>

  <div id="quizSection" class="main">
    <div class="card" id="quizCard">
      <div class="card-emoji" id="cardEmoji">🏒</div>
      <div class="card-label">QUICK · TAKE A GUESS</div>
      <h1 class="card-h" id="cardQuestion">Will the Maple Leafs win the Stanley Cup this year?</h1>
      <p class="card-p">Your gut answer. No wrong answers.</p>
      <div class="buttons">
        <button class="swipe-btn swipe-no" data-answer="no">
          <div class="swipe-label">NO</div>
          <div class="swipe-sub">👎 Doubt it</div>
        </button>
        <button class="swipe-btn swipe-yes" data-answer="yes">
          <div class="swipe-label">YES</div>
          <div class="swipe-sub">👍 For sure</div>
        </button>
      </div>
    </div>
    <div class="footer-text" id="quizHint">↑ TAP TO ANSWER</div>
  </div>

  <div id="resultsSection" class="results" style="display:none;">
    <div class="results-card">
      <div class="results-emoji">🎯</div>
      <h2 class="results-h">You're a natural.</h2>
      <p class="results-p">See how your picks compare to <b style="color:#fff;">14,820 hockey fans</b>.<br/>Sign up free to lock in your calls.</p>
      <div class="results-picks" id="resultsPicks"></div>
      <button class="results-cta">See how you did →</button>
      <p class="results-sub">Free · 30-second sign-up</p>
    </div>
  </div>
</div>

<script>
const questions = [
  { emoji:'🏒', q:'Will the Maple Leafs win the Stanley Cup this year?', yes:21 },
  { emoji:'🥅', q:'Will Connor McDavid score 60+ goals this season?', yes:42 },
  { emoji:'🇨🇦', q:'Will a Canadian team make the Stanley Cup Final?', yes:58 },
];

let currentIdx = 0;
let picks = [];

function updateUI() {
  const q = questions[currentIdx];
  document.getElementById('cardEmoji').textContent = q.emoji;
  document.getElementById('cardQuestion').textContent = q.q;
  document.getElementById('progressLabel').textContent = `${currentIdx+1} OF ${questions.length}`;
  
  const bars = document.querySelectorAll('.progress-bar');
  bars.forEach((b, i) => {
    if (i < picks.length) b.classList.add('done');
    else b.classList.remove('done');
  });
}

document.querySelectorAll('.swipe-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const answer = btn.dataset.answer;
    picks.push(answer);
    
    if (currentIdx < questions.length - 1) {
      currentIdx++;
      setTimeout(updateUI, 220);
    } else {
      showResults();
    }
  });
});

function showResults() {
  document.getElementById('quizSection').style.display = 'none';
  document.getElementById('resultsSection').style.display = 'flex';
  
  const resultsPicks = document.getElementById('resultsPicks');
  resultsPicks.innerHTML = questions.map((q, i) => `
    <div class="results-pick">
      <span class="results-emoji-sm">${q.emoji}</span>
      <span class="results-q">${q.q}</span>
      <span class="results-ans">${picks[i].toUpperCase()}</span>
    </div>
  `).join('');
}

updateUI();
</script>
</body>
</html>
